name: tests

# Runs the headless test suite on Linux (a byte-sensitive filesystem). This both
# exercises the educational pages and enforces NFC-normalized paths/content
# (tests/no-nfd.test.mjs) — NFD names that "work" on macOS break here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Run test suite
        run: |
          set -e
          for f in tests/*.test.mjs; do
            echo "=== $f ==="
            node "$f"
          done
